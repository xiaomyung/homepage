<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>atlas smoke test</title>
<style>
  body { font-family: monospace; background: #0a0a0a; color: #d0d0d0; padding: 2rem; }
  canvas { display: block; margin-top: 1rem; border: 1px solid #333; background: #111; }
  .ok { color: #9ece6a; }
  .fail { color: #f7768e; }
</style>
<link rel="preload" href="../../fonts/iosevka-term-regular.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: "Iosevka Term";
    src: url("../../fonts/iosevka-term-regular.woff2") format("woff2");
    font-display: block;
  }
</style>
</head>
<body>
  <h1>atlas smoke test</h1>
  <div id="log"></div>
  <div>atlas preview:</div>
  <canvas id="preview" width="256" height="256"></canvas>

<script type="module">
  import { buildAtlas } from './atlas.js';

  const log = document.getElementById('log');
  function write(cls, msg) {
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = msg;
    log.appendChild(div);
  }

  (async () => {
    try {
      const t0 = performance.now();
      const a1 = await buildAtlas();
      const t1 = performance.now();
      write('ok', `first call: ${(t1 - t0).toFixed(1)}ms   atlas ${a1.atlasSize}x${a1.atlasSize} px   ${a1.glyphs.size} glyphs`);

      const t2 = performance.now();
      const a2 = await buildAtlas();
      const t3 = performance.now();
      write(t3 - t2 < 50 ? 'ok' : 'fail',
        `second call: ${(t3 - t2).toFixed(1)}ms (<50ms = cache hit)`);

      write('ok', `glyph 'A': ${JSON.stringify(a1.glyphs.get('A'))}`);
      write('ok', `glyph '@': ${JSON.stringify(a1.glyphs.get('@'))}`);

      // Draw the atlas to the preview canvas
      const preview = document.getElementById('preview');
      const ctx = preview.getContext('2d');
      ctx.drawImage(a1.texture.image, 0, 0, 256, 256);
      write('ok', 'atlas drawn to preview canvas');
    } catch (err) {
      write('fail', `ERROR: ${err.message}`);
      console.error(err);
    }
  })();
</script>
</body>
</html>
