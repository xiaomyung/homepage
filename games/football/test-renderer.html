<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>renderer smoke test</title>
<style>
  body { font-family: monospace; background: #0a0a0a; color: #d0d0d0; padding: 2rem; }
  canvas { display: block; margin-top: 0.6rem; border: 1px solid #333; background: #111; width: 100%; max-width: 900px; }
  canvas.main { aspect-ratio: 5 / 2; }
  canvas.strip { aspect-ratio: 8 / 1; }
  .ok { color: #9ece6a; }
  .fail { color: #f7768e; }
  h2 { font-size: 0.9rem; color: #a0a0a0; margin: 1.2rem 0 0.4rem; }
  pre { font-size: 0.7rem; color: #909090; }
</style>
<link rel="preload" href="../../fonts/iosevka-term-regular.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: "Iosevka Term";
    src: url("../../fonts/iosevka-term-regular.woff2") format("woff2");
    font-display: block;
  }
</style>
</head>
<body>
  <h1>renderer diagnostic</h1>
  <div id="log"></div>

  <h2>full scene (animated, state.tick increments)</h2>
  <canvas id="stage-full" class="main"></canvas>

  <h2>walk cycle preview: 8 stickmen frozen at tick 0, 4, 7, 11, 14, 18, 21, 25</h2>
  <canvas id="stage-walk" class="strip"></canvas>

<script type="module">
  import { buildAtlas } from './atlas.js?v=62';
  import { Renderer } from './renderer.js?v=62';
  import { createField, createState, createSeededRng, FIELD_HEIGHT } from './physics.js?v=62';

  const log = document.getElementById('log');
  function write(cls, msg) {
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = msg;
    log.appendChild(div);
  }

  (async () => {
    try {
      const atlas = await buildAtlas();
      write('ok', `atlas loaded: ${atlas.glyphs.size} glyphs, ${atlas.atlasSize}px, cell ${atlas.glyphSize}px`);

      /* ── Full animated scene ─────────────────────── */

      const full = document.getElementById('stage-full');
      const r2 = new Renderer(full, atlas);
      r2.autoResize();

      const field = createField();
      const state = createState(field, createSeededRng(1));
      state.p1.x = 200;
      state.p1.y = FIELD_HEIGHT / 2;
      state.p1.stamina = 1.0;
      state.p2.x = 600;
      state.p2.y = FIELD_HEIGHT / 2 - 8;
      state.p2.stamina = 0.25;
      state.ball.x = 420;
      state.ball.y = FIELD_HEIGHT / 2;
      state.ball.z = 0;

      let t = 0;
      let lastP1x = state.p1.x;
      let lastP2x = state.p2.x;
      function frame() {
        t += 0.02;
        state.tick++;
        state.ball.x = 450 + Math.sin(t) * 200;
        state.ball.z = Math.max(0, Math.sin(t * 2) * 15);
        state.p1.x = 250 + Math.sin(t * 0.7) * 80;
        state.p2.x = 600 + Math.cos(t * 0.5) * 80;
        // Derive vx so the walk-anim speed gate triggers.
        state.p1.vx = (state.p1.x - lastP1x) * 3;
        state.p2.vx = (state.p2.x - lastP2x) * 3;
        lastP1x = state.p1.x;
        lastP2x = state.p2.x;
        state.p1.stamina = 0.5 + Math.sin(t * 0.3) * 0.5;
        state.p2.stamina = 0.5 + Math.cos(t * 0.3) * 0.5;
        r2.renderState(state);
        requestAnimationFrame(frame);
      }
      frame();
      write('ok', 'animation running');

      /* ── Walk cycle preview ──────────────────────── */

      const walkCanvas = document.getElementById('stage-walk');
      // Narrow field so 8 stickmen fit across.
      const stripFieldWidth = 900;
      const stripRenderer = new Renderer(walkCanvas, atlas, { fieldWidth: stripFieldWidth });
      stripRenderer.autoResize();

      // One state shared; we mutate p1 position + tick for each render and
      // stamp a snapshot into the strip. three.js doesn't support multiple
      // snapshots per-frame natively, so we fake it with a custom renderState
      // that paints 8 stickmen by cycling tick+position per glyph group.
      const stripState = createState(createField(stripFieldWidth), createSeededRng(2));
      stripState.p1.stamina = 1;
      stripState.p2.stamina = 1;
      stripState.p1.vx = 5;  // force walking
      stripState.p2.vx = 5;
      stripState.ball.x = -500; // offscreen — hide ball in strip
      stripState.ball.y = 0;

      // We want to override renderState for this instance to paint 8 stickmen
      // in one draw call. Hook it directly.
      const ticks = [0, 4, 7, 11, 14, 18, 21, 25];
      const spacing = stripFieldWidth / (ticks.length + 1);
      const originalRender = stripRenderer.renderState.bind(stripRenderer);
      stripRenderer.renderState = function() {
        const prevCursor = this._poolCursor;
        this._poolCursor = 0;
        // No ball — just stickmen at 8 positions with 8 tick values.
        for (let i = 0; i < ticks.length; i++) {
          const px = spacing * (i + 1) - 9;
          stripState.p1.x = px;
          stripState.p1.y = FIELD_HEIGHT / 2;
          stripState.p1.vx = 5;
          this._addStickman(stripState.p1, [0.82, 0.82, 0.82], ticks[i]);
        }
        for (let i = this._poolCursor; i < prevCursor; i++) this._pool[i].visible = false;
        this.renderer.render(this.scene, this.camera);
      };
      stripRenderer.renderState();
      write('ok', 'walk strip rendered');
    } catch (err) {
      write('fail', `ERROR: ${err.message}`);
      console.error(err);
    }
  })();
</script>
</body>
</html>
