<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>renderer smoke test</title>
<style>
  body { font-family: monospace; background: #0a0a0a; color: #d0d0d0; padding: 2rem; }
  canvas { display: block; margin-top: 1rem; border: 1px solid #333; background: #111; width: 100%; max-width: 900px; aspect-ratio: 5 / 2; }
  .ok { color: #9ece6a; }
  .fail { color: #f7768e; }
  pre { font-size: 0.7rem; color: #909090; }
</style>
<link rel="preload" href="../../fonts/iosevka-term-regular.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: "Iosevka Term";
    src: url("../../fonts/iosevka-term-regular.woff2") format("woff2");
    font-display: block;
  }
</style>
</head>
<body>
  <h1>renderer diagnostic</h1>
  <div id="log"></div>
  <pre id="glyph-dump"></pre>
  <div>test: full stickman scene (animated)</div>
  <canvas id="stage-full"></canvas>

<script type="module">
  import { buildAtlas } from './atlas.js?v=55';
  import { Renderer } from './renderer.js?v=55';
  import { createField, createState, createSeededRng, FIELD_HEIGHT } from './physics.js?v=55';

  const log = document.getElementById('log');
  function write(cls, msg) {
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = msg;
    log.appendChild(div);
  }

  (async () => {
    try {
      const atlas = await buildAtlas();
      write('ok', `atlas loaded: ${atlas.glyphs.size} glyphs, ${atlas.atlasSize}px, cell ${atlas.glyphSize}px`);

      // Dump a few glyph UVs for inspection
      const dump = document.getElementById('glyph-dump');
      const toCheck = ['O', 'o', 'A', '|', 'X', '─', '│', '┌', 'a', 'z'];
      const lines = toCheck.map(ch => {
        const g = atlas.glyphs.get(ch);
        if (!g) return `${ch}: NOT IN ATLAS`;
        return `${ch}: u=${g.u.toFixed(4)} v=${g.v.toFixed(4)} w=${g.w.toFixed(4)} h=${g.h.toFixed(4)}`;
      });
      dump.textContent = lines.join('\n');

      // Full animated scene
      const full = document.getElementById('stage-full');
      const r2 = new Renderer(full, atlas);
      r2.autoResize();

      const field = createField();
      const state = createState(field, createSeededRng(1));
      state.p1.x = 200;
      state.p1.y = FIELD_HEIGHT / 2;
      state.p1.stamina = 1.0;
      state.p2.x = 600;
      state.p2.y = FIELD_HEIGHT / 2 - 8;
      state.p2.stamina = 0.25;
      state.ball.x = 420;
      state.ball.y = FIELD_HEIGHT / 2;
      state.ball.z = 0;

      let t = 0;
      function frame() {
        t += 0.02;
        state.ball.x = 450 + Math.sin(t) * 200;
        state.ball.z = Math.max(0, Math.sin(t * 2) * 15);
        state.p1.x = 250 + Math.sin(t * 0.7) * 80;
        state.p2.x = 600 + Math.cos(t * 0.5) * 80;
        state.p1.stamina = 0.5 + Math.sin(t * 0.3) * 0.5;
        state.p2.stamina = 0.5 + Math.cos(t * 0.3) * 0.5;
        r2.renderState(state);
        requestAnimationFrame(frame);
      }
      frame();
      write('ok', 'animation running');
    } catch (err) {
      write('fail', `ERROR: ${err.message}`);
      console.error(err);
    }
  })();
</script>
</body>
</html>
